<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kindergarten Registration Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1 id="title">Kindergarten Registration Form</h1>
  <p id="description">Please fill out this form to register your child for kindergarten.</p>

  <form id="registration-form" action="/submit-form" method="POST">
    <label for="child-name" id="name-label">Child's Name:</label>
    <input type="text" id="child-name" name="child-name" required placeholder="Enter your child's name">

    <label for="birthdate" id="birthdate-label">Birthdate:</label>
    <input type="date" id="birthdate" name="birthdate" required>

    <label for="parent-name" id="parent-name-label">Parent's Name:</label>
    <input type="text" id="parent-name" name="parent-name" required placeholder="Enter your name">

    <label for="phone" id="phone-label">Phone Number:</label>
    <input type="text" id="phone" name="phone" required placeholder="Enter your phone number">

    <label for="email" id="email-label">Email Address:</label>
    <input type="email" id="email" name="email" required placeholder="Enter your email address">

    <label for="address" id="address-label">Home Address:</label>
    <input type="text" id="address" name="address" required placeholder="Enter your home address">

    <label for="medical-info" id="medical-info-label">Medical Information:</label>
    <textarea id="medical-info" name="medical-info" placeholder="Enter any important medical information"></textarea>

    <label for="emergency-contact" id="emergency-contact-label">Emergency Contact Name:</label>
    <input type="text" id="emergency-contact" name="emergency-contact" placeholder="Enter emergency contact's name">

    <label for="emergency-phone" id="emergency-phone-label">Emergency Contact Phone:</label>
    <input type="text" id="emergency-phone" name="emergency-phone" placeholder="Enter emergency contact's phone number">

    <label for="consent" id="consent-label">I consent to my child’s registration:</label>
    <input type="checkbox" id="consent" name="consent" required>

    <button type="submit" id="submit">Submit</button>
  </form>

</body>
</html>
